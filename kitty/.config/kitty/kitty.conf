# kitty.conf generated from iTerm2 profile: default-profile

# === FONTS ===
font_family      MesloLGSNFM-Regular
bold_italic_font MesloLGSNFM-Regular
font_size        15.0
symbol_map U+62928-U+62989 Symbols Nerd Font

# === COLORS: Tokyo Night Storm ===

# background
background            #1a1b26

# foreground
foreground            #c0cada

# cursor
cursor                #c0cada
cursor_text_color     #1a1b26

# ANSI black (color0)
color0    #15151e

# ANSI red (color1)
color1    #f7768e

# ANSI green (color2)
color2    #9ece6a

# ANSI yellow (color3)
color3    #f9af4a

# ANSI blue (color4)
color4    #4ea2f8

# ANSI magenta (color5)
color5    #bc9af8

# ANSI cyan (color6)
color6    #7dcff8

# ANSI white (color7)
color7    #a9b1d6

# ANSI bright black (color8)
color8    #414868

# ANSI bright red (color9)
color9    #f7768e

# ANSI bright green (color10)
color10   #9ece6a

# ANSI bright yellow (color11)
color11   #f9af4a

# ANSI bright blue (color12)
color12   #4ea2f8

# ANSI bright magenta (color13)
color13   #bc9af8

# ANSI bright cyan (color14)
color14   #7dcff8

# ANSI bright white (color15)
color15   #c0cada

# selection
selection_foreground #1a1b26
selection_background #c0cada

# === WINDOW ===
initial_window_width  80
initial_window_height 25
window_resize_step_cells 1

# === VISUAL ===
background_opacity 0.888
blur              yes

# === BELLS ===
enable_audio_bell  yes
visual_bell       yes

# === CURSOR ===
cursor_shape      block
cursor_blink      no

# === MOUSE ===
mouse_hide_wait   3.0
url_color         #4ea2f8

# === TERMINAL ===
term              xterm-256color

# === KEY BINDINGS ===
# Option key natural (no mapping)
macos_option_as_alt no

# === SCROLLBACK ===
scrollback_lines 10000

# === PERFORMANCE ===
repaint_delay    10
input_delay      3
sync_to_monitor  yes
